<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
</head>

<body style="
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    font-family:sans-serif;
">

    <div id="container" style="
        background: linear-gradient(45deg,#619175da, #17331c);
        padding:25px;
        border-radius:12px;
        box-shadow:0 0 15px rgba(0,0,0,0.5);
    ">

        <form>
            <h1 style="text-align:center;">Own Pocket Diary</h1>

            <input type="text" id="task"
                style="height:30px; width:300px; padding:5px; border-radius:5px; border:none;"
                placeholder="Enter your task..."
                required>
            <br><br>

            <button type="submit"
                style="height:35px; padding:5px 15px; border:none; border-radius:5px; cursor:pointer;">
                Add
            </button>
        </form>

        <div id="alltask" style="margin-top:20px;"></div>

    </div>

<script src="./todolist.js"></script>
</body>
</html>
